<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Home</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- Pakai fragment navbar (TIDAK DIUBAH) -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<!-- Main Content -->
<main class="flex-1">
    <div class="max-w-4xl mx-auto mt-6 px-4">
        <div class="bg-white rounded-lg shadow p-6">

            <h1 class="text-4xl font-bold mb-2"
                th:text="${title}">
                Title
            </h1>

            <p class="text-lg text-gray-600 mb-4"
               th:text="${description}">
                Description
            </p>

            <hr class="my-4">

            <h5 class="text-lg font-semibold mb-3">
                Jelajahi Produk:
            </h5>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/products}"
                   class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                    Semua Produk
                </a>

                <a th:href="@{/products/category/Elektronik}"
                   class="border border-blue-600 text-blue-600 px-4 py-2 rounded hover:bg-blue-50 transition">
                    Elektronik
                </a>

                <a th:href="@{/products/category/Buku}"
                   class="border border-blue-600 text-blue-600 px-4 py-2 rounded hover:bg-blue-50 transition">
                    Buku
                </a>

                <a th:href="@{/products/category/Makanan}"
                   class="border border-blue-600 text-blue-600 px-4 py-2 rounded hover:bg-blue-50 transition">
                    Makanan
                </a>
            </div>

        </div>
    </div>
</main>

<!-- Pakai fragment footer (TIDAK DIUBAH) -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
